name: Obsidian plugin CI

on:
  push:
    branches: ["**"]
    paths:
      - "obsidian-plugin/**"
      - ".github/workflows/obsidian-plugin-ci.yml"
  pull_request:
    paths:
      - "obsidian-plugin/**"
      - ".github/workflows/obsidian-plugin-ci.yml"

permissions:
  contents: read

concurrency:
  group: obsidian-plugin-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: obsidian-plugin

jobs:
  verify:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20.x", "22.x"]
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.32.1

      - name: Use Node ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
          cache-dependency-path: obsidian-plugin/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm test

      - name: Audit production release floor
        run: pnpm run audit

      - name: Build
        run: pnpm run build

      - name: Verify build output exists
        run: test -f main.js
